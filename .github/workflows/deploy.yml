name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Hugo (extended)
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "latest"
          extended: true

      - name: Build
        run: hugo --minify

      - name: Deploy to Voyager VPS
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avz --delete
          path: public/
          remote_path: /var/www/lukra-blog/
          remote_host: ${{ secrets.BLOG_DEPLOY_HOST }}
          remote_user: ${{ secrets.BLOG_DEPLOY_USER }}
          remote_key: ${{ secrets.BLOG_DEPLOY_SSH_KEY }}