{{ define "main" }}
<div class="lukra-root lukra-home">
    {{ partial "page-banner.html" (dict
    "title" .Title
    "eyebrow" .Params.eyebrow
    "stand" .Params.stand
    "scope" .Params.scope
    "benchmarks" .Params.benchmarks
    "basis" .Params.basis
    "workbook" .Params.workbook
    "backHref" "/blog/"
    "backLabel" "← All posts"
    ) }}
    <div class="masthead-home-photo page-photo-framed">
        <div class="page-card">
            <div class="wrap">
                {{ .Content }}
            </div>
        </div>
    </div>
</div>
{{ end }}
