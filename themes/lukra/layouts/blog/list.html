{{ define "main" }}
<div class="lukra-root lukra-home">
    {{ partial "page-banner.html" (dict
    "title" .Title
    "stand" .Site.Params.siteDescription
    "backHref" "/"
    "backLabel" "← Back to Lukra"
    ) }}
    <div class="masthead-home-photo page-photo-framed">
        <div class="page-card">
            <div class="wrap">
                <ul class="postlist">
                    {{ range .Pages.ByWeight }}
                    <li>
                        <a href="{{ .Permalink }}">{{ .Title }}</a>
                        {{ with .Params.stand }}<small>{{ . }}</small>{{ end }}
                    </li>
                    {{ end }}
                </ul>
            </div>
        </div>
    </div>
</div>
{{ end }}
